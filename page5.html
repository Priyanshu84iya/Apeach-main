<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com;"
  >
  <meta
    http-equiv="X-Content-Security-Policy"
    content="default-src 'self'; script-src 'self'"
  />
  <link rel="stylesheet" href="css/page5.css">
  <title>sleeping💕</title>
</head>
<body>
  <header class="header">
    <button id="backButton3" type="button" aria-label="Go back to menu">Go back</button>
    <h1>APEACH</h1>
  </header>

  <main class="main">
    <div id="loader" role="progressbar" aria-label="Sleeping progress">
      <progress id="p" value="0" max="100" aria-describedby="progress-label"></progress>
      <output for="p" id="progress-label"></output>
    </div>
    <img id="apeach" src="img/page-5.1.png" alt="Apeach sleeping peacefully" width="230" height="200" loading="lazy">
    <div class="sleeping" aria-label="Sleep animation with z symbols">
      <span aria-hidden="true">z</span>
      <span aria-hidden="true">z</span>
      <span aria-hidden="true">z</span>
    </div>
  </main>

  <div class="watermark" aria-hidden="true">@pry_uchiha</div>

  <script src="js/page5.js"></script>
</body>
</html>
